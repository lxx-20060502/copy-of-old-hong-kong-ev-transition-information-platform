<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product | Hong Kong's EV Transition Information Platform</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="products-page">
  <header class="site-header">
    <nav class="nav-shell">
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="products.html" class="nav-link active">Product</a>
        <a href="client.html" class="nav-link">Client</a>
      </div>
    </nav>
  </header>

  <main class="products-main">
    <section class="products-grid">
      <article class="product-tile vehicle-tile">
        <div class="product-bg product-bg-vehicle" aria-hidden="true"></div>
        <div class="product-overlay"></div>
        <a class="product-link product-link-top" href="vehicle-market.html" aria-label="Vehicle Market Statistics">
          <span>Vehicle</span>
          <span>Market</span>
          <span>Statistics</span>
        </a>
      </article>

      <article class="product-tile charging-tile">
        <div class="product-bg product-bg-charging" aria-hidden="true"></div>
        <div class="product-overlay"></div>
        <a class="product-link product-link-middle" href="charging-network.html" aria-label="E-Vehicle Charging Network">
          <span>E-Vehicle</span>
          <span>Charging</span>
          <span>Network</span>
        </a>
      </article>

      <article class="product-tile facility-tile">
        <div class="product-bg product-bg-facility" aria-hidden="true"></div>
        <div class="product-overlay"></div>
        <a class="product-link product-link-middle" href="hkg-facility.html" aria-label="HKG-area E-mobility Facility">
          <span>HKG-Area</span>
          <span>E-mobility</span>
          <span>Facility</span>
        </a>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
