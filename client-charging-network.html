      contractHtml: `<h3>Permitted Use</h3><p>The EV-Charging Network asset is provided by the Environmental Protection Department to the Map Service Provider for internal processing and customer-facing navigation services. Permitted use includes charger discovery, route planning, availability display, service integration, and operational support for digital mobility products.</p><h3>Restrictions</h3><p>The Consumer shall not redistribute, resell, sublicense, publish, or expose the raw operational dataset to any third party in a form that allows the underlying data to be copied, reconstructed, or retained independently of the authorized service environment. Access must be limited to authorized systems and personnel only.</p><h3>Retention</h3><p>The Consumer shall not cache or retain the operational data for more than five (5) minutes from the time of receipt, unless a shorter refresh cycle is technically required by the service. Any temporary copies created for processing, delivery, or display must be automatically replaced or deleted once they are no longer current. The Consumer shall not maintain a long-term archive of real-time status data.</p><h3>Compliance</h3><p>By accessing or using the asset, the Consumer accepts these terms. The Consumer is responsible for ensuring that all processing and storage activities remain compliant with applicable contractual requirements, including local data handling obligations where required. The Consumer must also provide clear source attribution to the Environmental Protection Department in any user-facing application or interface that displays the data.</p>`,
